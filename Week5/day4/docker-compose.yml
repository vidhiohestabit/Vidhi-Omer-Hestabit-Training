version: "3.9"

services:
  nginx:
    image: nginx:latest
    container_name: day4_nginx
    ports:
      - "8888:80"
      - "8442:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./certs:/etc/nginx/certs:ro
    restart: unless-stopped

    